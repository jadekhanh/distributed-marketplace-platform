spring:
  datasource:
    url: jdbc:h2:mem:marketplace_test
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    root: WARN

aws:
  region: us-east-2
  s3:
    bucket: jade-and-plushies-gang-marketplace