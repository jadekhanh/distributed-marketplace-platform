name: Java CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Downloads repository code into the GitHub Actions runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Installs Java 21 for the CI environment
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # Runs Maven clean test
      # This compiles the project and runs tests
      - name: Build and test
        run: mvn clean test